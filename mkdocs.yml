# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: fuse-augmentations
site_description: Evidence-backed documentation for fusing compatible image augmentation transforms into fewer resampling passes.
site_author: Jiri Borovec
site_url: https://borda.github.io/fuse-augmentations/
repo_name: Borda/fuse-augmentations
repo_url: https://github.com/Borda/fuse-augmentations
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2025–2026 Jiri Borovec
strict: true
exclude_docs: |
  adr/
watch:
  - src/fuse_augmentations

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - mkdocstrings:
      default_handler: python
      enable_inventory: true
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            filters:
              - "!^_"
            heading_level: 2
            inherited_members: false
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_root_full_path: false
            show_root_heading: true
            show_signature_annotations: true
            show_source: true
            signature_crossrefs: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Borda/fuse-augmentations
      name: fuse-augmentations on GitHub

nav:
  - Overview: index.md
  - Get started:
      - Install: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Concepts:
      - How fusion works: concepts/how-fusion-works.md
      - Capabilities: concepts/capabilities.md
  - Guides:
      - Backend pipelines: guides/backend-pipelines.md
      - Declarative configuration: guides/configuration.md
      - Auxiliary targets: guides/auxiliary-targets.md
      - Introspection: guides/introspection.md
      - Reproducibility: guides/reproducibility.md
  - Applications: applications.md
  - Research:
      - Quality and fidelity: research/quality-and-fidelity.md
      - Benchmarks: research/benchmarks.md
      - Methodology: research/methodology.md
  - API reference:
      - Core pipeline: reference/core.md
      - Configuration: reference/configuration.md
      - Types and targets: reference/types-and-targets.md
      - Advanced internals: reference/advanced.md
  - Known limitations: known-limitations.md
  - FAQ: faq.md
