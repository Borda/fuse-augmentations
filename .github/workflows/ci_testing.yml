name: CI complete testing

# see: https://help.github.com/en/actions/reference/events-that-trigger-workflows
on: # Trigger the workflow on push or pull request, but only for the main branch
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    shell: bash

jobs:
  doctests-only:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      UV_TORCH_BACKEND: cpu
      PYTHON_VERSION: "3.10"
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v7.2.0
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          activate-environment: true
      - name: 📦 Install base package (no extras)
        timeout-minutes: 5
        run: |
          uv pip install -e "." --group dev
          uv pip list
      - name: 🧪 Run doctests
        run: pytest src/ -v

  pytester:
    needs: doctests-only
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.12"]
        requires: ["latest"]
        include:
          - { os: "windows-latest", python-version: "3.12" }
          - { os: "macOS-latest", python-version: "3.12" }
          - { os: "ubuntu-latest", python-version: "3.10", requires: "oldest" }
    env:
      UV_TORCH_BACKEND: cpu
    # Timeout: https://stackoverflow.com/a/59076067/4521646
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v7.2.0
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
      - name: 📌 Pin minimum dependencies
        if: matrix.requires == 'oldest'
        run: |
          uv pip install tomlkit
          python .github/scripts/min_deps.py
      - name: 📦 Install dependencies
        timeout-minutes: 5
        run: |
          uv pip install -e ".[all]" --group dev
          uv pip list
      - name: 🧪 Run tests
        run: pytest . -v --cov=fuse_augmentations
      - name: 📊 Coverage statistics
        run: |
          coverage report
          coverage xml
      - name: ☁️ Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        # see: https://github.com/actions/toolkit/issues/399
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "coverage.xml"
          flags: cpu,${{ runner.os }},py${{ matrix.python-version }}
          env_vars: OS,PYTHON
          name: codecov-umbrella
          fail_ci_if_error: false

  testing-guardian:
    permissions: {}
    runs-on: ubuntu-latest
    needs: pytester
    if: always()
    steps:
      - run: echo "${{ needs.pytester.result }}"
      - name: ❌ Fail on test failure
        if: needs.pytester.result == 'failure'
        run: exit 1
      - name: ⏭️ Fail on cancel or skip
        if: contains(fromJSON('["cancelled", "skipped"]'), needs.pytester.result)
        timeout-minutes: 1
        run: sleep 90
