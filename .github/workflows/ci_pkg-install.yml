name: Install package

# see: https://help.github.com/en/actions/reference/events-that-trigger-workflows
on: # Trigger the workflow on push or pull request, but only for the main branch
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    shell: bash

jobs:
  pkg-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 🔍 Check package manifest
        run: |
          pip install check-manifest
          check-manifest
      - name: 🏗️ Build package
        run: |
          pip install --upgrade setuptools wheel build
          python -m build
      - name: ✅ Verify package
        run: |
          pip install --upgrade pip
          pip install --group dev
          twine check dist/*

  pkg-install:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: ["ubuntu-latest", "macOS-latest", "windows-latest"]
        python-version: ["3.10"]
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: 🏗️ Build package
        run: |
          pip install setuptools wheel build
          python -m build
      - name: 🚀 Install and smoke-test package
        working-directory: dist
        run: |
          ls -lh
          pip install $(python -c "import glob ; print(' '.join(glob.glob('*.whl')))")
          pip show fuse-augmentations
          python -c "import fuse_augmentations; print(fuse_augmentations.__version__)"

  pkg-install-watcher:
    permissions: {}
    runs-on: ubuntu-latest
    needs: ["pkg-install", "pkg-check"]
    if: always()
    steps:
      - run: echo "${{ needs.pkg-install.result }}"
      - name: ❌ Fail on job failure
        if: needs.pkg-install.result == 'failure'
        run: exit 1
      - name: ⏭️ Fail on cancel or skip
        if: contains(fromJSON('["cancelled", "skipped"]'), needs.pkg-install.result)
        timeout-minutes: 1
        run: sleep 90
