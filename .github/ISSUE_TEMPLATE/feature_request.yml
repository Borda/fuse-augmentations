name: ✨ Feature request
description: Propose a new capability or interface change.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Open a feature request before implementing a new public API, architecture change, or substantial feature, so scope and compatibility can be agreed first. Search [existing issues](https://github.com/Borda/fuse-augmentations/issues?q=is%3Aissue) before filing.
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: The concrete problem or use case this addresses. Describe the pipeline and what is missing today.
    validations:
      required: true
  - type: textarea
    id: interface
    attributes:
      label: Proposed interface
      description: The API, transform, or configuration surface you propose. A short usage sketch is ideal.
      render: python
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, existing workarounds, and why they are insufficient.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Compatibility and testing impact
      description: Effect on backend parity, random streams, auxiliary targets, testing, documentation, and migration.
    validations:
      required: false
